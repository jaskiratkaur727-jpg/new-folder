<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Algo Trading Bot</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f4; }
        #log { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .round { border-bottom: 1px solid #eee; padding: 5px 0; }
        .buy { color: green; font-weight: bold; }
        .sell { color: red; font-weight: bold; }
        .hold { color: gray; }
    </style>
</head>
<body>

    <h1>Algo Trading Bot Simulation</h1>
    <div id="log"></div>

    <script>
        // Initial Setup
        let balance = 1000;
        let stockPrice = 100;
        let holdings = 0;
        const logDiv = document.getElementById('log');

        // Function to update stock price randomly between 80 and 120
        function updatePrice() {
            return Math.floor(Math.random() * (120 - 80 + 1)) + 80;
        }

        // Function to decide action based on rules
        function decideAction(price) {
            if (price < 90 && balance >= price) {
                return "BUY";
            } else if (price > 110 && holdings > 0) {
                return "SELL";
            } else {
                return "HOLD";
            }
        }

        // Function to execute the trade
        function trade(action, price) {
            if (action === "BUY") {
                balance -= price;
                holdings += 1;
            } else if (action === "SELL") {
                balance += price;
                holdings -= 1;
            }
            // HOLD does nothing
        }

        // Simulation: Run for 10 rounds
        for (let round = 1; round <= 10; round++) {
            stockPrice = updatePrice();
            let action = decideAction(stockPrice);
            trade(action, stockPrice);

            // Displaying the results in HTML
            const result = `Round ${round}: Stock price = ${stockPrice} → 
                            Action = <span class="${action.toLowerCase()}">${action}</span> → 
                            Balance = ${balance.toFixed(2)}, Holdings = ${holdings}`;
            
            logDiv.innerHTML += `<div class="round">${result}</div>`;
            
            // Also logging to console for debugging
            console.log(`Round ${round}: Price: ${stockPrice}, Action: ${action}, Balance: ${balance}, Holdings: ${holdings}`);
        }
    </script>
</body>
</html>
